<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Portal | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #090a0f;
            overflow: hidden;
            color: white;
        }

        /* --- LOADING SCREEN STYLES --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #090a0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-title {
            font-size: 18px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 300;
            color: #00d2ff;
        }

        .progress-container {
            width: 250px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            box-shadow: 0 0 15px #00d2ff;
            transition: width 0.1s linear;
        }

        /* --- MAIN CONTENT STYLES --- */
        #main-content {
            opacity: 0;
            visibility: hidden;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            transition: opacity 1s ease;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 45px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.8s ease;
        }

        #main-content.active { opacity: 1; visibility: visible; }
        #main-content.active .glass-card { transform: translateY(0); }

        h2 { text-align: center; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px; }
        .subtitle { text-align: center; font-size: 13px; color: rgba(255, 255, 255, 0.4); margin-bottom: 35px; }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 12px; font-size: 14px; color: rgba(255, 255, 255, 0.7); }

        .radio-options { display: flex; gap: 12px; }
        .radio-options label {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
        }
        .radio-options input { display: none; }
        .radio-options input:checked + span { color: #00d2ff; font-weight: 600; text-shadow: 0 0 8px rgba(0, 210, 255, 0.5); }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            outline: none;
            resize: none;
            font-size: 14px;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.2);
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 210, 255, 0.4); filter: brightness(1.1); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Hidden Admin Click Area */
        #admin_access { position: absolute; top: 20px; right: 30px; opacity: 0.02; cursor: pointer; }
        #pc_tag { border: none; background: transparent; color: #fff; width: 60px; text-align: right; pointer-events: none; font-size: 10px; }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-title">Initializing Portal</div>
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
    </div>

    <div id="main-content">
        <div class="glass-card">
            <div id="admin_access" onclick="updatePC()">
                <input type="text" id="pc_tag" value="PC-001" readonly>
            </div>

            <h2>Feedback Form</h2>
            <p class="subtitle">Please provide your insights for system improvement.</p>

            <form id="feedbackForm">
                <div class="form-group">
                    <label>Feedback Category</label>
                    <div class="radio-options">
                        <label><input type="radio" name="type" value="Comments" checked> <span>Comments</span></label>
                        <label><input type="radio" name="type" value="Suggestions"> <span>Suggestions</span></label>
                        <label><input type="radio" name="type" value="Questions"> <span>Questions</span></label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Detailed Description</label>
                    <textarea id="descText" required placeholder="Type your message here..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Submit Feedback</button>
            </form>
        </div>
    </div>

    <script>
        // --- 1. LOADING LOGIC ---
        window.addEventListener('load', () => {
            let width = 0;
            const bar = document.getElementById('bar');
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    document.getElementById('loader-wrapper').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader-wrapper').style.visibility = 'hidden';
                        document.getElementById('main-content').classList.add('active');
                    }, 800);
                } else {
                    width += 2; // Loading Speed
                    bar.style.width = width + '%';
                }
            }, 30);
        });

        // --- 2. ADMIN AUTH LOGIC ---
        function updatePC() {
            const pass = prompt("Admin Authentication Required:");
            if (pass === "!@#PassWord123") {
                const newID = prompt("Update PC ID Number:", document.getElementById('pc_tag').value);
                if (newID) document.getElementById('pc_tag').value = newID;
            } else if (pass !== null) {
                alert("Unauthorized Access.");
            }
        }

        // --- 3. GOOGLE SHEET SUBMISSION ---
        document.getElementById('feedbackForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Sending Data...";
            btn.disabled = true;

            const payload = {
                pc_number: document.getElementById('pc_tag').value,
                type: document.querySelector('input[name="type"]:checked').value,
                description: document.getElementById('descText').value
            };

            try {
                // Your Web App URL
                const scriptURL = 'https://script.google.com/macros/s/AKfycbxSIBx59rsykTjgGZxg51JqcN1atoLb_r6dfTF4zZeZTu6ZBh-MLvziNxBHfnttPGDV/exec';
                
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                alert("Success! Your feedback has been recorded.");
                document.getElementById('descText').value = "";
            } catch (error) {
                alert("Network error. Please try again.");
            }
            
            btn.innerText = "Submit Feedback";
            btn.disabled = false;
        };
    </script>
</body>

</html>
